name: Build generated game artifacts

on:
  push:
    branches:
      - claude/wfc-map-generation-9hwwjn
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build generated artifacts
        run: node build.mjs

      - name: Commit generated artifacts
        run: |
          if ! git diff --quiet -- index.html dist/game.js docs/function-index.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html dist/game.js docs/function-index.md
            git commit -m "Build generated game artifacts"
            git push
          else
            echo "Generated artifacts are already up to date."
          fi
